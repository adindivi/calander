      // --- Header Component ---
      function Header({ onOpenPreorder, orderCount, onOpenOrderHistory }) {
        const [activeTab, setActiveTab] = useState('features');

        const scrollToSection = (id, tabName) => {
          setActiveTab(tabName);
          const element = document.getElementById(id);
          if (element) {
            const offset = 80;
            const bodyRect = document.body.getBoundingClientRect().top;
            const elementRect = element.getBoundingClientRect().top;
            const elementPosition = elementRect - bodyRect;
            const offsetPosition = elementPosition - offset;

            window.scrollTo({
              top: offsetPosition,
              behavior: 'smooth'
            });
          }
        };

        return (
          <nav className="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 md:px-10 py-4 bg-white/70 backdrop-blur-xl border-b border-gray-200/40 shadow-sm transition-all duration-300">
            <div className="flex items-center gap-8">
              <div className="flex items-center gap-2 cursor-pointer" onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}>
                <div className="w-9 h-9 rounded-xl bg-gradient-to-tr from-[#0058bc] to-[#5ad4fe] flex items-center justify-center shadow-md">
                  <Icons.Orbit className="w-5 h-5 text-white animate-spin-slow" />
                </div>
                <span className="font-sans text-xl font-extrabold tracking-tight bg-gradient-to-r from-[#0058bc] to-[#006781] bg-clip-text text-transparent">
                  Crystal Cal
                </span>
              </div>
              
              <div className="hidden md:flex gap-6">
                <button 
                  onClick={() => scrollToSection('features', 'features')}
                  className={`font-sans text-sm font-semibold relative pb-1 transition-all cursor-pointer ${
                    activeTab === 'features' ? 'text-[#0058bc]' : 'text-gray-500 hover:text-[#0058bc]'
                  }`}
                >
                  Core Features
                  {activeTab === 'features' && <span className="absolute bottom-0 left-0 w-full h-[2px] bg-[#0058bc] rounded-full"></span>}
                </button>
                <button 
                  onClick={() => scrollToSection('benefits', 'benefits')}
                  className={`font-sans text-sm font-semibold relative pb-1 transition-all cursor-pointer ${
                    activeTab === 'benefits' ? 'text-[#0058bc]' : 'text-gray-500 hover:text-[#0058bc]'
                  }`}
                >
                  Career Benefits
                  {activeTab === 'benefits' && <span className="absolute bottom-0 left-0 w-full h-[2px] bg-[#0058bc] rounded-full"></span>}
                </button>
                <button 
                  onClick={() => scrollToSection('pricing', 'pricing')}
                  className={`font-sans text-sm font-semibold relative pb-1 transition-all cursor-pointer ${
                    activeTab === 'pricing' ? 'text-[#0058bc]' : 'text-gray-500 hover:text-[#0058bc]'
                  }`}
                >
                  Pricing
                  {activeTab === 'pricing' && <span className="absolute bottom-0 left-0 w-full h-[2px] bg-[#0058bc] rounded-full"></span>}
                </button>
              </div>
            </div>

            <div className="flex items-center gap-3">
              {orderCount > 0 && (
                <button 
                  onClick={onOpenOrderHistory}
                  className="flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-blue-100 text-[#0058bc] text-xs font-semibold hover:bg-blue-200 transition-all cursor-pointer"

                  <Icons.ShoppingCart className="w-3.5 h-3.5" />

      // --- Hero Component ---
      function Hero({ onOpenPreorder, activeCompanies, scheduleEvents, rgbGlowColor, triggerNotification, onSelectCompanyToggle }) {
        const [time, setTime] = useState(new Date());
        const [isLiveDemo, setIsLiveDemo] = useState(true);
        const [selectedTheme, setSelectedTheme] = useState('cyan');

        useEffect(() => {
          const timer = setInterval(() => setTime(new Date()), 1000);
          return () => clearInterval(timer);
        }, []);

        const formatTime = (date) => {
          return date.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
        };

        const formatDate = (date) => {
          return date.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' });
        };

        const getThemeGlow = () => {
          if (triggerNotification) return '#ffba20'; // Warm warning yellow
          if (selectedTheme === 'cyan') return '#5ad4fe';
          if (selectedTheme === 'purple') return '#af5afe';
          if (selectedTheme === 'amber') return '#ffba20';
          return rgbGlowColor;
        };

        const themeColor = getThemeGlow();

        const visibleEvents = scheduleEvents.filter(ev => 
          activeCompanies.some(comp => comp.id === ev.companyId)
        );

        return (
          <section className="relative min-h-screen pt-32 pb-20 px-6 md:px-10 flex flex-col items-center justify-center overflow-hidden bg-gradient-to-tr from-[#f2f4f6] via-[#f7f9fb] to-[#e6e8ea]">
            <div className="absolute -top-40 right-0 w-[500px] h-[500px] bg-[#5ad4fe]/10 rounded-full blur-[120px] pointer-events-none"></div>
            <div className="absolute top-1/2 -left-40 w-[600px] h-[600px] bg-[#0058bc]/5 rounded-full blur-[140px] pointer-events-none"></div>

            <div className="relative z-10 text-center max-w-4xl mx-auto w-full">
              <div className="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-white/60 backdrop-blur-md border border-white/40 shadow-sm mb-8">
                <Icons.Sparkles className="w-4 h-4 text-[#0058bc]" />
                <span className="font-sans text-xs font-bold text-[#0058bc] uppercase tracking-widest">
                  THE FUTURE OF WORKSPACE
                </span>
              </div>

              <h1 className="font-sans text-4xl sm:text-5xl md:text-6xl font-extrabold text-gray-900 tracking-tight leading-[1.1] mb-6">
                취업의 순간을 <span className="text-[#0058bc] italic font-serif">투명하게,</span><br />완벽하게.
              </h1>

              <p className="font-sans text-base sm:text-lg md:text-xl text-gray-600 mb-10 max-w-2xl mx-auto leading-relaxed">
                허공에 떠오르는 스마트 투명 디스플레이로 당신의 일정을 시각화하세요.<br className="hidden sm:inline" />
                Crystal Cal은 물리적 환경을 정돈하고, 집중력 넘치는 완벽한 데스크 일상을 전해 드립니다.
              </p>

              <div className="flex justify-center gap-4 mb-8">
                <button 
                  onClick={() => setIsLiveDemo(false)}
                  className={`px-4 py-2.5 rounded-full text-xs font-bold transition-all cursor-pointer flex items-center gap-1.5 shadow-sm ${
                    !isLiveDemo ? 'bg-[#0058bc] text-white' : 'bg-white/80 hover:bg-white text-gray-600 border border-gray-200'
                  }`}
                >
                  <Icons.Compass className="w-3.5 h-3.5" />
                  실제 제품 갤러리 보기
                </button>
                
                <button 
                  onClick={() => setIsLiveDemo(true)}
                  className={`px-4 py-2.5 rounded-full text-xs font-bold transition-all cursor-pointer flex items-center gap-1.5 shadow-md ${
                    isLiveDemo ? 'bg-gradient-to-r from-[#0058bc] to-[#006781] text-white ring-2 ring-[#5ad4fe]/30' : 'bg-white/80 hover:bg-white text-gray-600 border border-gray-200'
                  }`}
                >
                  <Icons.MonitorDot className="w-3.5 h-3.5" />
                  가상 투명 캘린더 구동 (Live)

          setChatInput('');
          
          const userMsg = {
            id: Date.now().toString(),
            sender: 'user',
            text: text,
            timestamp: new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', hour12: false })

          setIsSending(true);

          setTimeout(() => {
            const reply = getClientSimulatedReply(text);

              id: (Date.now() + 1).toString(),
              sender: 'ai',
              text: reply,
              timestamp: new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', hour12: false })

            setChatMessages(prev => [...prev, botMsg]);
            setIsSending(false);

        const getClientSimulatedReply = (text) => {

          }
          if (norm.includes("삼성") || norm.includes("samsung")) {
            return "삼성전자 하반기 채용 서류 마감이 코앞으로 다가왔어요! 연구원/3급 신입 채용인 만큼 직무 과제 준비 상태와 자기소개서의 협업 항목 포인트를 꼭 체크해 보세요. Crystal Cal 화면 테두리가 은은한 블루로 깜빡이도록 알림을 세팅해 두었답니다! 📆";

          }
          if (norm.includes("skt") || norm.includes("skt")) {
            return "SKT 면접 준비를 돕기 위해 실시간 코칭 자료를 불러왔습니다. SKT의 핵심 가치인 '패기와 열정'을 기반으로 한 협업 사례를 1분 자기소개에 어필해 보세요! 오후 2시 세션 시작 10분 전에 음성 가이드를 보낼게요! 🔔";

          ];

          { id: 'ev3', companyId: 'skt', companyName: 'SKT', title: 'SKT 코딩테스트 1차 세션', date: '2026-06-29', type: 'coding', dDay: 7 },
          { id: 'ev4', companyId: 'skt', companyName: 'SKT', title: '직무 역량 직군 기술 면접', date: '2026-07-22', type: 'interview', dDay: 30 },
          { id: 'ev5', companyId: 'naver', companyName: '네이버', title: '네이버 클라우드 개발 인턴십 서류 마감', date: '2026-06-27', type: 'document', dDay: 5 },
          { id: 'ev6', companyId: 'naver', companyName: '네이버', title: '1차 실무진 아키텍처 토론 면접', date: '2026-07-06', type: 'interview', dDay: 14 },
          { id: 'ev7', companyId: 'kakao', companyName: '카카오', title: '하반기 공채 자소서 마감', date: '2026-06-30', type: 'document', dDay: 8 },
          { id: 'ev8', companyId: 'kakao', companyName: '카카오', title: '카카오 개발 직무 전공 코딩테스트', date: '2026-07-16', type: 'coding', dDay: 24 }
        ];

        const [rgbGlowColor, setRgbGlowColor] = useState('#5ad4fe');
        const [triggerNotification, setTriggerNotification] = useState(false);
        const [preOrders, setPreOrders] = useState([]);
        const [isPreorderOpen, setIsPreorderOpen] = useState(false);
        const [preorderType, setPreorderType] = useState('rental');
        const [isOrderHistoryOpen, setIsOrderHistoryOpen] = useState(false);

        useEffect(() => {
          const saved = localStorage.getItem('crystal_cal_orders_standalone');
          if (saved) {
            try {
              setPreOrders(JSON.parse(saved));
            } catch (e) {
              console.error("Error reading saved orders:", e);
            }
          }
        }, []);

        const handleToggleCompany = (companyId) => {
          setActiveCompanies(prev => {
            const exists = prev.some(c => c.id === companyId);
            if (exists) {
              if (prev.length <= 1) {
                alert('가상 디스플레이에 노출될 스케줄을 위해 최소 한 곳의 연동 기업은 활성화해 두어야 합니다! 😊');
                return prev;
              }
              return prev.filter(c => c.id !== companyId);
            } else {
              const found = allCompanies.find(c => c.id === companyId);
              return found ? [...prev, found] : prev;
            }
          });
        };

        const handleTriggerNotificationAlert = () => {
          setTriggerNotification(true);
          
          // Synthesize elegant Web Audio signal beep
          try {
            const AudioCtx = window.AudioContext || window.webkitAudioContext;
            if (AudioCtx) {
              const ctx = new AudioCtx();
              const osc = ctx.createOscillator();
              const gain = ctx.createGain();
              
              osc.connect(gain);
              gain.connect(ctx.destination);
              
              osc.type = 'sine';
              osc.frequency.setValueAtTime(880, ctx.currentTime); // High pitch A note
              gain.gain.setValueAtTime(0.08, ctx.currentTime);
              gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
              
              osc.start();
              osc.stop(ctx.currentTime + 0.35);
            }
          } catch (e) {
            console.log('Synthesized notification sounds failed or not supported in this frame.');
          }

          setTimeout(() => {
            setTriggerNotification(false);
          }, 4000);
        };

        const handleNewOrder = (order) => {
          const updated = [...preOrders, order];
          setPreOrders(updated);
          localStorage.setItem('crystal_cal_orders_standalone', JSON.stringify(updated));
        };

        const handleClearOrders = () => {
          if (window.confirm("진행 중인 모든 사전 예약 이력을 초기화하시겠습니까?")) {
            setPreOrders([]);
            localStorage.removeItem('crystal_cal_orders_standalone');
            setIsOrderHistoryOpen(false);
          }
        };

        return (
          <div className="min-h-screen bg-slate-50 text-slate-900">
            
            {/* Nav Header */}
            <Header 
              onOpenPreorder={(type) => { setPreorderType(type); setIsPreorderOpen(true); }}
              orderCount={preOrders.length}
              onOpenOrderHistory={() => setIsOrderHistoryOpen(true)}
            />

            {/* Hero Banner Section */}
            <Hero 
              onOpenPreorder={(type) => { setPreorderType(type); setIsPreorderOpen(true); }}
              activeCompanies={activeCompanies}
              scheduleEvents={initialScheduleEvents}
              rgbGlowColor={rgbGlowColor}
              triggerNotification={triggerNotification}
              onSelectCompanyToggle={handleToggleCompany}
            />

            {/* Feature Modules Section */}
            <Features 
              companies={allCompanies}
              activeCompanies={activeCompanies}
              onToggleCompany={handleToggleCompany}
              onTriggerNotification={handleTriggerNotificationAlert}
              rgbGlowColor={rgbGlowColor}
              onSetRgbGlowColor={setRgbGlowColor}
            />

            {/* Core Benefits Section */}
            <Benefits />

            {/* Simple Testimonial Quote Analogy */}
            <EasyExplanation />

            {/* Final CTA Banner Section */}
            <section className="py-28 px-6 md:px-10 bg-gradient-to-b from-white to-slate-100" id="pricing">
              <div className="max-w-4xl mx-auto bg-gradient-to-tr from-slate-900 to-slate-950 p-10 sm:p-16 rounded-[40px] text-center shadow-2xl relative overflow-hidden text-white border border-white/10">
                <div className="absolute top-0 right-0 w-[200px] h-[200px] bg-[#5ad4fe]/10 rounded-full blur-[80px]"></div>
                <div className="absolute bottom-0 left-0 w-[200px] h-[200px] bg-[#0058bc]/10 rounded-full blur-[80px]"></div>

                <h2 className="font-sans text-2xl sm:text-3xl md:text-4xl font-extrabold mb-6 leading-tight">
                  지금 당신의 책상에 혁신을 더하세요.
                </h2>
                
                <p className="font-sans text-sm sm:text-base text-gray-400 mb-10 max-w-lg mx-auto leading-relaxed">
                  한정 수량 사전 예약이 뜨거운 성원 속에 진행 중입니다. 지금 신청하고 최초 특전 및 얼리버드 전용 가을 한정 캐릭터 테마를 완벽하게 선점하세요.
                </p>

                <div className="flex flex-col sm:flex-row gap-4 justify-center items-stretch sm:items-center max-w-md mx-auto">
                  <button 
                    onClick={() => { setPreorderType('rental'); setIsPreorderOpen(true); }}
                    className="bg-[#0058bc] text-white font-sans text-sm font-bold px-8 py-4 rounded-2xl hover:scale-105 active:scale-95 transition-all shadow-xl shadow-primary/25 cursor-pointer flex items-center justify-center gap-2"
                  >
                    <Icons.Smartphone className="w-4 h-4" />
                    렌탈 케어 신청하기
                  </button>
                  
                  <button 
                    onClick={() => { setPreorderType('purchase'); setIsPreorderOpen(true); }}
                    className="bg-white/10 hover:bg-white/15 text-white font-sans text-sm font-bold px-8 py-4 rounded-2xl border border-white/20 transition-all cursor-pointer flex items-center justify-center gap-2"
                  >
                    <Icons.Gift className="w-4 h-4" />
                    얼리버드 영구 소장하기
                  </button>
                </div>
              </div>
            </section>

            {/* Simple Footer */}
            <footer className="w-full px-6 md:px-10 py-16 flex flex-col md:flex-row justify-between items-center gap-8 bg-slate-100 border-t border-slate-200" id="support">
              <div className="flex flex-col items-center md:items-start gap-4">
                <div className="flex items-center gap-2 cursor-pointer" onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}>
                  <div className="w-8 h-8 rounded-lg bg-gradient-to-tr from-[#0058bc] to-[#5ad4fe] flex items-center justify-center shadow-md">
                    <Icons.Orbit className="w-4.5 h-4.5 text-white" />
                  </div>
                  <span className="font-sans text-lg font-black tracking-tight text-slate-800">
                    Crystal Cal
                  </span>
                </div>
                <p className="font-sans text-xs text-slate-450">© 2026 Crystal Tech Systems. All rights reserved.</p>
              </div>

              <div className="flex gap-6 text-xs text-slate-500 font-semibold">
                <a href="#features" className="hover:text-[#0058bc] transition-colors">Features</a>
                <a href="#benefits" className="hover:text-[#0058bc] transition-colors">Benefits</a>
                <a href="#pricing" className="hover:text-[#0058bc] transition-colors">Pricing</a>
                <a href="https://github.com" target="_blank" rel="noreferrer" className="hover:text-[#0058bc] transition-colors">GitHub Pages</a>
              </div>
            </footer>

            {/* Modals Container */}
            <PreOrderModal 
              isOpen={isPreorderOpen}
              onClose={() => setIsPreorderOpen(false)}
              type={preorderType}
              onSaveOrder={handleNewOrder}
            />

            <OrderHistoryModal 
              isOpen={isOrderHistoryOpen}
              onClose={() => setIsOrderHistoryOpen(false)}
              orders={preOrders}
              onClear={handleClearOrders}
            />

          </div>
        );
      }

      // Render the compiled JSX into the Virtual DOM
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
